<script>
function renderGrid(list){
  const grid=document.getElementById('fullGrid');
  grid.innerHTML='';
  list.forEach((p,i)=>{
    if(!p.images.length) return;
    const card=document.createElement('div');
    card.className='pcard reveal d'+(i%3);
    card.dataset.city=p.city;
    card.onclick=()=>location.href=`project.html?slug=${p.slug}`;
    card.innerHTML=`<div class="cimg"><img src="images/${p.slug}/${p.images[0]}" alt="${p.name}" loading="lazy"/></div>
    <div class="cbody"><div class="ctag">פרויקט בוטיק</div><h3>${p.name}</h3><span>${p.city}</span></div>`;
    grid.appendChild(card);
  });
  document.querySelectorAll('.reveal').forEach(el=>obs2.observe(el));
}

const obs2=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});
},{threshold:0.1});

function filterProjects(city,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered=city==='all'?PROJECTS:PROJECTS.filter(p=>p.city===city);
  renderGrid(filtered);
}

renderGrid(PROJECTS);
</script>
